name: tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: '1.20'
            otp: '29'
    steps:
      # rext_dev depends on rext via a `path: "../rext"` dep, so rext must be
      # checked out as a sibling. When both repos live under the same org this
      # resolves cleanly; adjust the repository ref if that changes.
      - uses: actions/checkout@v4
        with:
          path: rext_dev
      - uses: actions/checkout@v4
        with:
          repository: genericjam/rext
          path: rext

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps + _build
        uses: actions/cache@v4
        with:
          path: |
            rext_dev/deps
            rext_dev/_build
          key: mix-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('rext_dev/**/mix.lock') }}
          restore-keys: mix-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: deps.get
        working-directory: rext_dev
        run: mix deps.get
      - name: compile
        working-directory: rext_dev
        run: mix compile --warnings-as-errors
      - name: Format check
        working-directory: rext_dev
        run: mix format --check-formatted
      - name: Credo (strict)
        working-directory: rext_dev
        run: mix credo --strict
      - name: Tests
        working-directory: rext_dev
        run: mix test
